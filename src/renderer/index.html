<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" />
  <title>Send It</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Title / status bar (draggable on macOS) -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M3 11.5 21 3l-6.5 18-3.2-7.3L3 11.5Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="title">Send It</span>
          <span class="subtitle" id="selfName">this machine</span>
        </div>
      </div>

      <div class="topbar-right">
        <button class="status-pill searching" id="statusPill" title="Connection status">
          <span class="dot"></span>
          <span class="status-text" id="statusText">Searching…</span>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 13.5a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 6.9 4.2l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
      </div>
    </header>

    <main class="body">
      <!-- Composer -->
      <section class="composer" id="dropZone">
        <div class="composer-head">
          <span class="label">New note</span>
          <label class="mono-toggle">
            <input type="checkbox" id="monoToggle" />
            <span>Code mode</span>
          </label>
        </div>

        <textarea id="editor" class="editor" placeholder="Type or paste anything — text, code, a screenshot…&#10;&#10;Press ⌘/Ctrl + Enter to send it to your other machine."></textarea>

        <div id="attachment" class="attachment hidden"></div>

        <div class="composer-actions">
          <button class="btn ghost" id="pasteBtn" title="Pull whatever is on the clipboard">
            <svg viewBox="0 0 24 24" width="16" height="16"><rect x="8" y="3" width="8" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M9 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            Paste clipboard
          </button>
          <div class="spacer"></div>
          <span class="hint" id="dropHint">drop a file anywhere</span>
          <button class="btn primary" id="sendBtn">
            Send It
            <kbd>⌘⏎</kbd>
          </button>
        </div>
      </section>

      <!-- History -->
      <section class="history">
        <div class="history-head">
          <span class="label">History</span>
          <button class="text-btn" id="clearBtn">Clear all</button>
        </div>
        <div class="feed" id="feed">
          <div class="empty" id="emptyState">
            <div class="empty-icon">✦</div>
            <p>Nothing sent yet.</p>
            <span>Send a note and it shows up here and on your other machine instantly.</span>
          </div>
        </div>
      </section>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Settings panel -->
    <div class="modal-backdrop hidden" id="settingsModal">
      <div class="modal">
        <h2>Settings</h2>
        <label class="field">
          <span>This machine's name</span>
          <input type="text" id="nameInput" placeholder="e.g. Mac Mini" />
        </label>
        <p class="modal-hint">Shown on your other machine so you know where a note came from.</p>
        <div class="modal-actions">
          <button class="btn ghost" id="settingsClose">Done</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
