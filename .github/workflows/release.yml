name: Build & Release

# Builds the Linux AppImage on a real Linux runner and attaches it to a
# GitHub Release. Push a tag like v1.0.0 to cut a release; or run manually
# from the Actions tab to just produce a downloadable build artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage (x64)
        run: npx electron-builder --linux AppImage --x64
        env:
          CSC_IDENTITY_AUTODISCOVERY: "false"

      # Always keep the build downloadable from the run (handy for manual runs).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SendIt-linux-AppImage
          path: dist/*.AppImage

      # On a version tag, publish it as a real Release.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Send It ${{ github.ref_name }}
          files: dist/*.AppImage
          body: |
            ## Send It ${{ github.ref_name }}

            **Linux:** download the `.AppImage` below, then:
            ```bash
            chmod +x "Send It-"*.AppImage
            ./Send\ It-*.AppImage
            ```
            Or just mark it executable in your file manager (Properties → Permissions) and double-click it.

            **macOS:** build locally with `npm install && npm run dist:mac` (see the README).

            Open it on both machines and they'll find each other automatically over your LAN.
