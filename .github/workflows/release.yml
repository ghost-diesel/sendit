name: Build & Release

# Builds the Linux AppImage on a real Linux runner and attaches it to a
# GitHub Release. Push a tag like v1.0.0 to cut a release; or run manually
# from the Actions tab to just produce a downloadable build artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage (x64)
        # --publish never: electron-builder otherwise auto-publishes on a tag and
        # demands a token; we let the Release step below handle uploads instead.
        # electron-builder rebuilds node-pty (a native module, no Linux prebuild —
        # so it compiles from source here) for Electron's ABI and unpacks it from
        # the asar automatically; the next step asserts that actually happened.
        run: npx electron-builder --linux AppImage --x64 --publish never
        env:
          CSC_IDENTITY_AUTODISCOVERY: "false"

      # Fail loudly if the Remote Terminal's native module didn't make it into the
      # package — a green build that silently dropped node-pty would ship a broken
      # terminal. Checks the unpacked .node + the executable spawn-helper.
      - name: Verify node-pty bundled
        run: |
          U="dist/linux-unpacked/resources/app.asar.unpacked/node_modules/node-pty/build/Release"
          test -f "$U/pty.node" || { echo "::error::node-pty pty.node missing from package"; exit 1; }
          test -x "$U/spawn-helper" || { echo "::error::node-pty spawn-helper missing or not executable"; exit 1; }
          echo "✓ node-pty bundled and unpacked: $(ls -1 "$U")"

      # Always keep the build downloadable from the run (handy for manual runs).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SendIt-linux-AppImage
          path: dist/*.AppImage

      # On a version tag, publish it as a real Release.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Send It ${{ github.ref_name }}
          # latest-linux.yml + blockmap are what the in-app updater reads to
          # detect and verify a new version — they MUST be in the release.
          files: |
            dist/*.AppImage
            dist/latest-linux.yml
            dist/*.blockmap
          body: |
            ## Send It ${{ github.ref_name }}

            **Linux:** download the `.AppImage` below, then:
            ```bash
            chmod +x "Send It-"*.AppImage
            ./Send\ It-*.AppImage
            ```
            Or just mark it executable in your file manager (Properties → Permissions) and double-click it.

            **macOS:** build locally with `npm install && npm run dist:mac` (see the README).

            Open it on both machines and they'll find each other automatically over your LAN.
